server {
    listen 80;
    server_name _;
    
    root /usr/share/nginx/html;
    index index.html;
    include /etc/nginx/mime.types;

    # Cloudflare optimization bypass
    add_header Cache-Control "no-transform";

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /connect/ {
        proxy_pass http://sonagi-draw-backend:5858/connect/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    location /uploads/ {
        proxy_pass http://sonagi-draw-backend:5858/uploads/;
    }

    location /unfurl {
        proxy_pass http://sonagi-draw-backend:5858/unfurl;
    }
}
